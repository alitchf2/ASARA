version: 1
backend:
  phases:
    build:
      commands:
        - amplifyPush --simple

frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npx tsc -p tsconfig.json --noEmit

  artifacts:
    baseDirectory: .
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*